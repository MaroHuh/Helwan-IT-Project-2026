<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyStore</title>

    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/light-theme.css" id="theme-link" />
    <style>
      :root {
        --bg: #f5f5f0;
        --surface: #ffffff;
        --border: #ddd;
        --text: #1a1a1a;
        --muted: #666;
        --accent: #181818;
        --accent-h: #0c140f;
      }

      #top-bar {
        display: flex;
        justify-self: center;
        align-items: center;
        min-width: 50%;
        gap: 0.75rem;
        margin-bottom: 1.25rem;
      }

      #search-bar {
        flex: 1;
        padding: 0.65rem 1rem;
        font-size: 1rem;
        font-family: Arial, sans-serif;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        background: var(--bg);
        color: var(--text);
        outline: none;
        transition: border-color 0.15s;
      }

      #search-bar:focus {
        border-color: var(--accent);
      }

      #view-buttons {
        border: 1.5px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        display: flex;
      }

      #products-wrapper {
        width: 100%;
        padding: 1rem;
      }

      #shop-layout {
        display: flex;
        align-items: flex-start;
        gap: 1.5rem;
      }

      #category-list {
        flex-shrink: 0;
        width: 130px;
        border: 1.5px solid var(--border);
        border-radius: 16px;
        padding: 1rem 0.75rem;
      }

      #category-list h5 {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
        font-family: Arial, sans-serif;
        margin: 0 0 0.5rem 0;
      }

      #category-list ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }

      #category-list ul li {
        padding: 0.4rem 0.75rem;
        font-size: 0.8rem;
        margin-top: 10px;
        font-family: Arial, sans-serif;
        border: 1.5px solid var(--border);
        border-radius: 999px;
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        text-align: center;
        transition:
          background 0.15s,
          border-color 0.15s,
          color 0.15s;
        user-select: none;
      }

      #category-list ul li:hover,
      #category-list ul li.active {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--surface);
      }

      #products-grid {
        flex: 1;
        min-height: 650px;
      }

      .view-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
      }

      .product-card {
        animation: fadeIn 0.25s both;
      }

      .card-info {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.4rem;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        padding: 1.2rem 1rem;
        background: var(--surface);
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
        text-align: center;
      }

      .card-info:hover {
        border-color: var(--accent);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      }

      .card-cat {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        font-family: Arial, sans-serif;
        font-weight: 600;
      }

      .card-img {
        width: 140px;
        height: 140px;
        cursor: pointer;
      }

      .card-img img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .card-name {
        font-size: 1rem;
        color: var(--text);
      }

      .card-price {
        font-size: 0.9rem;
        color: var(--muted);
        font-family: Arial, sans-serif;
      }

      .add-to-cart-btn,
      .wishlist-btn {
        padding: 0.4rem 1rem;
        font-size: 0.85rem;
        font-family: Arial, sans-serif;
        border: 1.5px solid var(--border);
        border-radius: 7px;
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        transition: border-color 0.15s;
        width: 100%;
      }

      .add-to-cart-btn:hover:not(:disabled),
      .wishlist-btn:hover:not(:disabled) {
        border-color: var(--accent);
      }

      .add-to-cart-btn:disabled,
      .wishlist-btn:disabled {
        opacity: 0.5;
        cursor: auto;
      }

      #no-results {
        text-align: center;
        padding: 2rem;
        color: var(--muted);
        font-size: 1rem;
      }

      #page-buttons {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        margin-top: 1.5rem;
        padding-top: 1rem;
        border-top: 1px solid var(--border);
      }

      #page-buttons button {
        padding: 0.5rem 1.2rem;
        font-size: 0.9rem;
        font-family: Arial, sans-serif;
        border: 1.5px solid var(--border);
        border-radius: 7px;
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        transition:
          background 0.15s,
          border-color 0.15s,
          color 0.15s;
      }

      #page-buttons button:hover:not(:disabled) {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--surface);
      }

      #page-buttons button:disabled {
        opacity: 0.35;
        cursor: auto;
      }

      #page-indicator {
        font-size: 0.88rem;
        color: var(--muted);
        font-family: Arial, sans-serif;
        min-width: 90px;
        text-align: center;
      }

      .hidden {
        display: none;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 700px) {
        #shop-layout {
          flex-direction: column;
        }
        #top-bar {
          justify-self: auto;
          max-width: 70%;
          margin-left: 1rem;
        }

        #category-list {
          width: 75%;
          box-sizing: border-box;
          margin-left: 15px;
        }

        #category-list ul {
          flex-direction: row;
          flex-wrap: wrap;
          gap: 0.4rem;
        }

        #category-list ul li {
          font-size: 0.72rem;
          padding: 0.3rem 0.6rem;
        }

        #products-grid {
          min-height: 400px;
          margin-left: 15px;
        }

        .view-grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 0.5rem;
        }

        .card-img {
          width: 80px;
          height: 80px;
        }

        #search-bar {
          font-size: 0.9rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <header id="navbar"></header>

    <!-- Main Content -->
    <main id="products-wrapper">
      <div id="top-bar">
        <input type="text" id="search-bar" placeholder="Search products..." />
      </div>

      <div id="shop-layout">
        <div id="category-list">
          <h5>Categories</h5>
          <ul>
            <li class="active" onclick="changeCategory('all')">All</li>
            <li onclick="changeCategory('clothing')">Clothing</li>
            <li onclick="changeCategory('footwear')">Footwear</li>
            <li onclick="changeCategory('accessories')">Accessories</li>
            <li onclick="changeCategory('electronics')">Electronics</li>
            <li onclick="changeCategory('stationery')">Stationery</li>
          </ul>
        </div>

        <div id="products-grid" class="view-grid"></div>
      </div>

      <p id="no-results" class="hidden">No products found.</p>

      <div id="page-buttons">
        <button id="prev-btn" onclick="changePage(-1)">&#8592; Prev</button>
        <span id="page-indicator"></span>
        <button id="next-btn" onclick="changePage(1)">Next &#8594;</button>
      </div>
    </main>

    <!-- Footer -->
    <footer id="footer"></footer>
    <script src="../js/products.js"></script>
    <script src="../js/search.js"></script>
    <script src="../js/main.js"></script>
  </body>
</html>
