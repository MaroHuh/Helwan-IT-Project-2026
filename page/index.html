<!doctype html>
<!--Products Page-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./CSS/style.css" />
    <title>Shop</title>
    <script>
      const darkMode = localStorage.getItem("darkMode");
      if (darkMode === "true") {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>
  <body>
    <nav id="navbar">
      <a
        href="https://marohuh.github.io/Helwan-IT-Project-2026/"
        class="nav-links"
        >Home</a
      >
      <span onclick="changeTheme()">Theme</span>
    </nav>

    <div id="main-products-wrapper">
      <input type="text" id="search-bar" placeholder="Search products..." />
      <button class="list-grid-toggle" id="list-toggle" onclick="listToggle()">
        List
      </button>
      <button
        class="list-grid-toggle"
        id="grid-toggle"
        disabled
        onclick="gridToggle()"
      >
        Grid
      </button>
      <main id="products-wrapper">
        <div id="products-grid" class="view-grid">
          <!-- products appended with javascript-->
        </div>

        <p id="no-results" class="hidden">No products found.</p>

        <div id="page-buttons">
          <button id="prev-btn" onclick="changePage(-1)">&#8592; Prev</button>
          <span id="page-indicator"></span>
          <button id="next-btn" onclick="changePage(1)">Next &#8594;</button>
        </div>
      </main>
    </div>

    <script src="Script/script.js"></script>
  </body>
</html>
