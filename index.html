<!doctype html>
<!--Products Page-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./CSS/style.css" />
    <title>Shop</title>
  </head>
  <body>
    <nav id="navbar">
      <a
        href="https://marohuh.github.io/Helwan-IT-Project-2026/"
        class="nav-links"
        >Home</a
      >
      <span onclick="changeTheme()">Theme</span>
    </nav>

    <div id="main-products-wrapper">
      <input type="text" id="search-bar" placeholder="Search products..." />
      <button class="list-grid-toggle" id="list-toggle" onclick="listToggle()">
        List
      </button>
      <button
        class="list-grid-toggle"
        id="grid-toggle"
        disabled
        onclick="gridToggle()"
      >
        Grid
      </button>
      <main id="products-wrapper">
        <div id="products-grid" class="view-grid">
          <!-- products appended with javascript-->
        </div>

        <p id="no-results" class="hidden">No products found.</p>

        <div id="page-buttons">
          <button id="prev-btn" onclick="changePage(-1)">&#8592; Prev</button>
          <span id="page-indicator"></span>
          <button id="next-btn" onclick="changePage(1)">Next &#8594;</button>
        </div>
      </main>
    </div>

    <script>
      const grid = document.getElementById("products-grid");
      const gridBtn = document.getElementById("grid-toggle");
      const listBtn = document.getElementById("list-toggle");
      const body = document.body;
      const searchBar = document.getElementById("search-bar");
      const pageIndicator = document.getElementById("page-indicator");
      const prevBtn = document.getElementById("prev-btn");
      const nextBtn = document.getElementById("next-btn");
      const noResults = document.getElementById("no-results");

      const PRODUCTS = [
        //product list
        { id: 1, name: "Potato", price: 1.99, category: "Vegetables" },
        { id: 2, name: "Tomato", price: 1.49, category: "Vegetables" },
        { id: 3, name: "Cucumber", price: 0.99, category: "Vegetables" },
        { id: 4, name: "Carrot", price: 0.79, category: "Vegetables" },
        { id: 5, name: "Broccoli", price: 1.29, category: "Vegetables" },
        { id: 6, name: "Banana", price: 0.59, category: "Fruits" },
        { id: 7, name: "Apple", price: 0.89, category: "Fruits" },
        { id: 8, name: "Orange", price: 1.19, category: "Fruits" },
        { id: 9, name: "Milk", price: 1.79, category: "Dairy" },
        { id: 10, name: "Cheese", price: 3.49, category: "Dairy" },
        { id: 11, name: "Ice Cream", price: 3.99, category: "Frozen" },
        { id: 12, name: "Bread", price: 1.99, category: "Bakery" },
      ];

      const productsPerPage = 6;
      let currentPage = 1;
      let filteredData = [...PRODUCTS]; //filtered data variable to not manipulate the original list

      function render() {
        const totalPages = Math.max(
          1,
          Math.ceil(filteredData.length / productsPerPage), //making the total number of pages always fit the entire products list even if it changes
        );
        if (currentPage > totalPages) currentPage = totalPages;

        const start = (currentPage - 1) * productsPerPage; // start at the correct array index for the page
        const slice = filteredData.slice(start, start + productsPerPage); // store from the correct array index to the correct last array index for the page

        grid.innerHTML = ""; // removing any already rendered cards
        noResults.classList.toggle("hidden", filteredData.length > 0); // if filtered data is bigger than 0, hide the no results message

        slice.forEach((p, i) => {
          const card = document.createElement("div");
          card.className = "product-card";
          card.style.animationDelay = `${i * 100}ms`; // using the index * 100 so they dont all fade in at once
          card.innerHTML = `
            <div class="card-info">
              <div class="card-cat">${p.category}</div>
              <div class="card-name">${p.name}</div>
              <div class="card-price">$${p.price}</div>
            </div>`;
          grid.appendChild(card); //add each card as a child to the grid
        });

        pageIndicator.textContent = `Page ${currentPage} of ${totalPages}`;
        prevBtn.disabled = currentPage === 1; //disable previous button if at page 1
        nextBtn.disabled = currentPage === totalPages; //disable next button if at the last page
      }

      function changePage(dir) {
        const totalPages = Math.ceil(filteredData.length / productsPerPage);
        currentPage = Math.min(Math.max(1, currentPage + dir), totalPages); // if dir = -1, go back a page, if dir = 1, go forwards a page
        render(); // calling the render function to update the changes to the cards and animate them
      }

      searchBar.addEventListener("input", function () {
        const q = this.value.toLowerCase().trim();
        filteredData = PRODUCTS.filter(
          //change filteredData to only include products matching the search
          (p) =>
            p.name.toLowerCase().includes(q) ||
            p.category.toLowerCase().includes(q),
        );
        currentPage = 1;
        render(); //calling the render function to update the changes to the cards
      });

      function changeTheme() {
        body.classList.toggle("dark");
      }
      function gridToggle() {
        grid.classList.add("view-grid");
        grid.classList.remove("view-list");
        gridBtn.disabled = 1;
        listBtn.disabled = 0;
        render();
      }
      function listToggle() {
        grid.classList.add("view-list");
        grid.classList.remove("view-grid");
        listBtn.disabled = 1;
        gridBtn.disabled = 0;
        render();
      }

      render();
    </script>
  </body>
</html>
